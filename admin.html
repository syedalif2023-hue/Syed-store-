<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syed Admin - Smart Billing</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1b5e20; --accent: #e65100; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .hidden { display: none; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; }
        .rate-input { width: 80px; border: 2px solid var(--primary); padding: 5px; border-radius: 5px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
    </style>
</head>
<body>

<div id="auth-section" class="card" style="text-align:center;">
    <h2>Admin Login</h2>
    <input type="tel" id="my-phone" placeholder="91XXXXXXXXXX" style="width:80%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ccc;">
    <button class="btn" style="background:var(--primary);" onclick="login()">Orders Check Krun</button>
</div>

<div id="dashboard" class="hidden">
    <div id="orders-list"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDpiRG3ZwxY9trXn4l4RPSdNDalaRzPmaU",
        databaseURL: "https://syed-kirana-shop-default-rtdb.firebaseio.com",
        projectId: "syed-kirana-shop"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let adminNum = "";

    function login() {
        adminNum = document.getElementById('my-phone').value;
        if(!adminNum) return alert("Number din!");
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        loadOrders();
    }

    function loadOrders() {
        db.ref('all_orders/' + adminNum).on('value', (snap) => {
            const list = document.getElementById('orders-list');
            list.innerHTML = "";
            const orders = snap.val();
            if(!orders) return list.innerHTML = "<p style='text-align:center;'>Order nei.</p>";
            for(let id in orders) {
                if(orders[id].status === "Pending") renderOrder(id, orders[id], list);
            }
        });
    }

    function renderOrder(id, data, container) {
        let rows = "";
        data.items.forEach(itm => {
            rows += `<tr><td>${itm.name}</td><td>${itm.qty}${itm.unit}</td><td><input type="number" class="r-${id}" data-q="${itm.qty}" data-u="${itm.unit}" data-n="${itm.name}" oninput="calc('${id}')" placeholder="Rate"></td></tr>`;
        });
        const div = document.createElement('div');
        div.className = "card";
        div.innerHTML = `<b>ID: ${id}</b><br><small>Date: ${data.time}</small><table><tr><th>Item</th><th>Qty</th><th>Rate</th></tr>${rows}</table><div style="text-align:right; font-weight:bold; color:red; margin-top:10px;">Total: ₹<span id="tot-${id}">0.00</span></div><button class="btn" style="background:#25D366;" onclick="sendBill('${id}', '${data.customerContact}')">Share Invoice (WhatsApp)</button>`;
        container.prepend(div);
    }

    function calc(id) {
        let t = 0;
        document.querySelectorAll('.r-' + id).forEach(i => {
            let r = parseFloat(i.value) || 0;
            let q = parseFloat(i.dataset.q);
            t += (i.dataset.u === "Gm") ? (r/1000)*q : r*q;
        });
        document.getElementById('tot-' + id).innerText = t.toFixed(2);
    }

    function sendBill(id, customerNum) {
        const total = document.getElementById('tot-' + id).innerText;
        if(total == "0.00") return alert("Rate boshun!");
        let msg = `*📄 SYED STORE INVOICE*\nID: ${id}\n----------\n`;
        document.querySelectorAll('.r-' + id).forEach(i => {
            let sub = (i.dataset.u === "Gm" ? i.value/1000 : i.value) * i.dataset.q;
            msg += `✅ ${i.dataset.n}: ${i.dataset.q}${i.dataset.u} x ${i.value} = ₹${sub.toFixed(2)}\n`;
        });
        msg += `----------\n*TOTAL: ₹${total}*\nDhanyabad!`;
        db.ref('all_orders/' + adminNum + '/' + id).update({ status: "Done", finalBill: total });
        window.open(`https://wa.me/${customerNum}?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
