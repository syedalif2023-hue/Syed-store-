<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syed Natural - Live Poultry App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d32f2f">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/htB6KXHz/Screenshot-2026-0322-222857.png">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; box-sizing: border-box; overflow-x: hidden; }
        .app-container { max-width: 450px; min-height: 100vh; margin: auto; background: white; position: relative; display: flex; flex-direction: column; }
        .header { background: #d32f2f; color: white; text-align: center; padding: 15px; border-bottom: 5px solid #b71c1c; }
        .logo-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid white; background: white; object-fit: cover; }
        .live-timer { font-size: 0.7rem; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 20px; display: inline-block; margin-top: 5px; }
        
        #installBanner { display: none; background: #fff; padding: 15px; text-align: center; border-bottom: 2px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .inst-btn { background: #d32f2f; color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 0.9rem; }

        .progress-container { display: flex; justify-content: center; gap: 10px; padding: 10px; background: #fff; border-bottom: 1px solid #eee; }
        .step-dot { width: 8px; height: 8px; background: #ddd; border-radius: 50%; transition: 0.3s; }
        .step-dot.active { background: #d32f2f; width: 20px; border-radius: 10px; }
        .order-section { padding: 15px; flex-grow: 1; }
        .step-page { display: none; }
        .step-page.active { display: block; animation: slideIn 0.3s ease-out; }
        .menu-card { background: #fff; border: 2px solid #eee; border-radius: 12px; padding: 10px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .menu-card.selected { border-color: #d32f2f; background: #fff9f9; transform: scale(0.98); }
        .menu-img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
        .menu-info h3 { margin: 0; font-size: 0.95rem; color: #333; }
        .menu-rate { color: #d32f2f; font-weight: bold; font-size: 1rem; }
        
        /* New GPS Button Style */
        .gps-btn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
        #distStatus { font-size: 0.8rem; color: #d32f2f; font-weight: bold; text-align: center; margin-bottom: 10px; }

        label { display: block; margin-top: 10px; font-weight: bold; color: #555; font-size: 0.85rem; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .result-box { background: #fff1f1; padding: 12px; border-radius: 12px; border: 2px dashed #d32f2f; margin-top: 15px; text-align: center; }
        .final-val { font-size: 1.6rem; color: #d32f2f; font-weight: 900; }
        #sub-text { font-size: 0.85rem; color: #666; font-weight: bold; }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn-next { background: #d32f2f; color: white; border: none; flex: 1; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-back { background: #f0f0f0; color: #666; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="installBanner">
    <div style="font-size: 0.85rem; color: #444;">Fast ordering ke liye app install karein!</div>
    <button class="inst-btn" id="installBtn">INSTALL APP</button>
</div>

<div class="modal" id="summaryModal">
    <div class="modal-content">
        <h3 style="color:#d32f2f; margin-top:0;">Order Summary</h3>
        <div id="summaryData" style="line-height: 1.6; font-size: 0.9rem;"></div>
        <button class="btn-next" style="background:#25d366; width:100%; margin-top:15px;" onclick="confirmAndSend()">Confirm & Send Order</button>
        <button class="btn-back" style="width:100%; margin-top:10px;" onclick="closeModal()">Edit Order</button>
    </div>
</div>

<div class="app-container">
    <div class="header">
        <img src="https://i.postimg.cc/htB6KXHz/Screenshot-2026-0322-222857.png" class="logo-img">
        <h2 style="margin:5px 0 0; font-size: 1.2rem;">SYED POULTRY SHOP</h2>
        <div class="live-timer" id="liveClock">Loading...</div>
    </div>

    <div id="main-app">
        <div class="progress-container">
            <div class="step-dot active" id="dot1"></div>
            <div class="step-dot" id="dot2"></div>
            <div class="step-dot" id="dot3"></div>
            <div class="step-dot" id="dot4"></div>
        </div>

        <div class="order-section">
            <div class="step-page active" id="step1">
                <div class="menu-card" id="c1" onclick="pick('Whole Chicken', 'whole', 'c1')">
                    <img src="https://i.postimg.cc/zBrFghFn/images-(1).png" class="menu-img">
                    <div class="menu-info"><h3>Whole Chicken</h3><div class="menu-rate" id="rate-whole">Loading...</div></div>
                </div>
                <div class="menu-card" id="c2" onclick="pick('Curry Cut', 'curry', 'c2')">
                    <img src="https://i.postimg.cc/LsBNvvXy/c770bfb6-bb8a-48b9-abe3-df519a0c7954-(1).png" class="menu-img">
                    <div class="menu-info"><h3>Curry Cut</h3><div class="menu-rate" id="rate-curry">Loading...</div></div>
                </div>
                <div class="menu-card" id="c3" onclick="pick('Boneless', 'bone', 'c3')">
                    <img src="https://i.postimg.cc/rwhSpbDy/1734373006Chicken-Breast-Boneless.png" class="menu-img">
                    <div class="menu-info"><h3>Boneless</h3><div class="menu-rate" id="rate-bone">Loading...</div></div>
                </div>
                <button class="btn-next" onclick="go(2)" style="width:100%; margin-top:10px;">Next ➔</button>
            </div>

            <div class="step-page" id="step2">
                <label>Aapka Naam:</label>
                <input type="text" id="custName" placeholder="Enter Name">
                <label>Mobile Number:</label>
                <input type="tel" id="custPhone" placeholder="10-digit number" maxlength="10">
                <div class="btn-row">
                    <button class="btn-back" onclick="goToStep(1)">Back</button>
                    <button class="btn-next" onclick="go(3)">Next</button>
                </div>
            </div>

            <div class="step-page" id="step3">
                <p id="selTitle" style="font-weight:bold; color:#d32f2f; margin-bottom:5px;"></p>
                <select id="method" onchange="calc()"><option value="weight">Wazan (KG/GM)</option><option value="money">Paisa (Rs)</option></select>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="number" id="qty" oninput="calc()" placeholder="0">
                    <select id="unit" onchange="calc()" style="width:100px;"><option value="kg">KG</option><option value="gm">GM</option><option value="rs" id="optRs" style="display:none;">Rs</option></select>
                </div>
                <div class="result-box"><div class="final-val" id="total">₹0</div><div id="sub-text">Calculation Details</div></div>
                <div class="btn-row"><button class="btn-back" onclick="goToStep(2)">Back</button><button class="btn-next" onclick="go(4)">Next</button></div>
            </div>

            <div class="step-page" id="step4">
                <button type="button" class="gps-btn" onclick="getGPS()">📍 Detect My Location (Auto Rate)</button>
                <div id="distStatus"></div>

                <label>Manual Area Selection:</label>
                <select id="area" onchange="updateV(); calc();"><option value="">-- Area --</option><option value="Dubrajpur">Dubrajpur</option><option value="Ilambazar">Ilambazar</option></select>
                <label>Village:</label>
                <select id="vill" style="margin-top:10px;"><option value="">-- Gaon --</option></select>
                <input type="text" id="land" placeholder="Landmark" style="margin-top:10px;">
                <div class="btn-row"><button class="btn-back" onclick="goToStep(3)">Back</button><button class="btn-next" style="background:#25d366;" onclick="showSum()">Review Order</button></div>
            </div>
        </div>
    </div>
</div>

<script>
    let AAJ_KA_RATE = { whole: 0, curry: 0, bone: 0 };
    let selItem = ""; let currentRate = 0;
    let deferredPrompt;
    let deliveryCharge = 0;

    // --- SHOP LOCATION (Tarulia Bus Stand Set Kiya Gaya Hai) ---
    const SHOP_LAT = 23.7155; 
    const SHOP_LON = 87.4580;

    const villages = {
        "Dubrajpur": ["তরুলিয়া", "মেটাগ্রাম", "শিমুলডিহি", "ঝিরুল", "আমুড়ি", "আউলিয়া", "গোপালপুর", "রেংনা", "ভাটগ্রাম", "মাহমুদপুর", "পুলসra", "কামালপুর", "ফকিরবেড়া"],
        "Ilambazar": ["Achhaipara", "Akamba", "Amladihi", "Anaipur", "Baharampur", "Balarpur", "Balta", "Baranabagram", "Baruipur", "Batikor", "Beloa", "Bhabanipur", "Bharatpur", "Brahmandihi", "Chak Paran", "Chaupahari", "Chella", "Dhalla", "Dhulpur", "Dumrui", "Etapur"]
    };

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('installBanner').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
        if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
    });

    async function loadRates() {
        try {
            const response = await fetch('rates.json?v=' + new Date().getTime());
            AAJ_KA_RATE = await response.json();
            updateUI();
        } catch (error) {
            AAJ_KA_RATE = { whole: 180, curry: 220, bone: 350 };
            updateUI();
        }
    }

    function updateUI(){
        document.getElementById('rate-whole').innerText = `₹${AAJ_KA_RATE.whole}/kg`;
        document.getElementById('rate-curry').innerText = `₹${AAJ_KA_RATE.curry}/kg`;
        document.getElementById('rate-bone').innerText = `₹${AAJ_KA_RATE.bone}/kg`;
    }

    function pick(n, k, id){
        selItem = n; currentRate = AAJ_KA_RATE[k];
        document.querySelectorAll('.menu-card').forEach(c => c.classList.remove('selected'));
        document.getElementById(id).classList.add('selected');
        document.getElementById('selTitle').innerText = `${n} (₹${currentRate}/kg)`;
        calc();
    }

    function getGPS() {
        const status = document.getElementById('distStatus');
        status.innerText = "Finding location...";
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = calculateDistance(SHOP_LAT, SHOP_LON, pos.coords.latitude, pos.coords.longitude);
                deliveryCharge = Math.max(20, Math.round(dist * 8));
                status.innerText = `Distance: ${dist.toFixed(1)} KM | Delivery: ₹${deliveryCharge}`;
                calc();
            }, () => { status.innerText = "GPS Error! Please select manually."; });
        }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function calc(){
        let m = document.getElementById('method').value; 
        let q = parseFloat(document.getElementById('qty').value) || 0; 
        let u = document.getElementById('unit').value;
        let area = document.getElementById('area').value;
        
        if(deliveryCharge === 0) {
            if(area === "Dubrajpur") deliveryCharge = 20;
            else if(area === "Ilambazar") deliveryCharge = 40;
        }

        let itemPrice = (m === "weight") ? Math.round((u==="kg"?currentRate:currentRate/1000)*q) : q;
        document.getElementById('total').innerText = "₹" + (itemPrice + deliveryCharge);
        document.getElementById('sub-text').innerText = `Item: ₹${itemPrice} + Delivery: ₹${deliveryCharge}`;
    }

    function go(s){ 
        if(s==2 && !selItem) { alert("Chicken type select karein!"); return; }
        if(s==3 && (!document.getElementById('custName').value || !document.getElementById('custPhone').value)) { alert("Details bhariye!"); return; }
        goToStep(s); 
    }

    function goToStep(s){
        document.querySelectorAll('.step-page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.step-dot').forEach(d => d.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
        for(let i=1; i<=s; i++) document.getElementById('dot' + i).classList.add('active');
    }

    function updateV(){
        let a = document.getElementById('area').value; let v = document.getElementById('vill');
        v.innerHTML = '<option value="">-- Gaon --</option>';
        if (a) villages[a].forEach(x => { let o = document.createElement('option'); o.value=x; o.text=x; v.add(o); });
    }

    function showSum(){
        if(!document.getElementById('vill').value && deliveryCharge === 0) { alert("Location set karein!"); return; }
        document.getElementById('summaryData').innerHTML = `
            👤 Name: ${document.getElementById('custName').value}<br>
            📞 Phone: ${document.getElementById('custPhone').value}<br>
            🍗 Item: ${selItem}<br>
            🚚 Delivery: ₹${deliveryCharge}<br>
            💰 Total: ${document.getElementById('total').innerText}<br>
            🏠 Gaon: ${document.getElementById('vill').value || 'GPS Detected'}
        `;
        document.getElementById('summaryModal').style.display = 'flex';
    }

    function closeModal(){ document.getElementById('summaryModal').style.display = 'none'; }

    function confirmAndSend(){
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value;
        const total = document.getElementById('total').innerText;
        const village = document.getElementById('vill').value || "GPS Location";
        const land = document.getElementById('land').value || "N/A";
        
        const samay = new Date().toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:true });

        let msg = `*🐔 SYED POULTRY SHOP - ORDER*%0A` +
                  `🗓️ *Time:* ${samay}%0A` +
                  `----------------------------%0A` +
                  `👤 *Customer:* ${name}%0A` +
                  `📞 *Phone:* ${phone}%0A` +
                  `🍗 *Item:* ${selItem}%0A` +
                  `🚚 *Delivery:* ₹${deliveryCharge}%0A` +
                  `💰 *Total Bill: ${total}*%0A` +
                  `🏠 *Loc:* ${village}%0A` +
                  `📍 *Land:* ${land}%0A` +
                  `----------------------------%0A` +
                  `_Order from App_`;
        
        window.open(`https://wa.me/918637831146?text=${msg}`);
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
    }

    loadRates();
    setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleString(); }, 1000);
</script>
</body>
</html>
